service: arsenal-api
useDotenv: true

provider:
  name: aws
  runtime: nodejs20.x
  region: us-east-1
  stage: ${opt:stage, 'dev'}
  environment:
    FOOTBALL_API_KEY: ${env:FOOTBALL_API_KEY, ssm:/tgw/football-api-key}
    NEWS_API_KEY: ${env:NEWS_API_KEY, ssm:/tgw/news-api-key}
    ALLOWED_ORIGINS: ${self:custom.allowedOrigins.${self:provider.stage}}
    ADMIN_KEY: ${env:ADMIN_KEY, ssm:/tgw/admin-key}
    IG_ACCESS_TOKEN: ${env:IG_ACCESS_TOKEN, ssm:/tgw/ig-access-token}
    IG_ACCOUNT_ID: ${env:IG_ACCOUNT_ID, ssm:/tgw/ig-account-id}
    X_APP_KEY: ${env:X_APP_KEY, ssm:/tgw/x-app-key}
    X_APP_SECRET: ${env:X_APP_SECRET, ssm:/tgw/x-app-secret}
    X_ACCESS_TOKEN: ${env:X_ACCESS_TOKEN, ssm:/tgw/x-access-token}
    X_ACCESS_TOKEN_SECRET: ${env:X_ACCESS_TOKEN_SECRET, ssm:/tgw/x-access-token-secret}
    S3_IMAGES_BUCKET: ${env:S3_IMAGES_BUCKET, 'tgw-social-images'}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - bedrock:InvokeModel
          Resource:
            - "arn:aws:bedrock:*::foundation-model/*"
            - "arn:aws:bedrock:*:*:inference-profile/*"
        - Effect: Allow
          Action:
            - bedrock:InvokeAgent
          Resource:
            - "arn:aws:bedrock:us-east-1:*:agent/*"
            - "arn:aws:bedrock:us-east-1:*:agent-alias/*"
        - Effect: Allow
          Action:
            - s3:PutObject
          Resource:
            - "arn:aws:s3:::tgw-social-images/*"
  apiGateway:
    apiKeys:
      - tgw-frontend-${self:provider.stage}
      - footbball-app-${self:provider.stage}
    usagePlan:
      quota:
        limit: 1000
        period: DAY
      throttle:
        burstLimit: 15
        rateLimit: 10

custom:
  allowedOrigins:
    dev: "https://the-gooners-world.web.app,https://the-footbball-app.web.app"
    prod: "https://the-gooners-world.web.app,https://the-footbball-app.web.app"

functions:
  footballProxy:
    handler: functions/proxy/footballProxy.handler
    events:
      - http:
          path: proxy/football
          method: get
          cors: true
          private: true

  newsProxy:
    handler: functions/proxy/newsProxy.handler
    timeout: 15
    events:
      - http:
          path: proxy/news
          method: get
          cors: true
          private: true

  aiProxy:
    handler: functions/proxy/aiProxy.handler
    timeout: 15
    events:
      - http:
          path: proxy/ai
          method: get
          cors: true
          private: true

  agentHandler:
    handler: functions/agent/agentHandler.handler
    timeout: 29
    description: Bedrock Agent Core action group handler — Arsenal FC data tools

  agentChat:
    handler: functions/agent/agentChat.handler
    timeout: 30
    environment:
      BEDROCK_AGENT_ID: ${env:BEDROCK_AGENT_ID, 'PLACEHOLDER'}
      BEDROCK_AGENT_ALIAS_ID: ${env:BEDROCK_AGENT_ALIAS_ID, 'PLACEHOLDER'}
    events:
      - http:
          path: agent/chat
          method: post
          cors: true
          private: true

  generateMatchPost:
    handler: functions/admin/generateMatchPost.handler
    timeout: 20
    events:
      - http:
          path: admin/generate
          method: post
          cors: true
          private: true
      - http:
          path: admin/generate
          method: options
          cors: true

  publishPost:
    handler: functions/admin/publishPost.handler
    timeout: 30
    events:
      - http:
          path: admin/publish
          method: post
          cors: true
          private: true
      - http:
          path: admin/publish
          method: options
          cors: true

plugins:
  - serverless-offline
