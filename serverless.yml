service: arsenal-api
useDotenv: true

provider:
  name: aws
  runtime: nodejs20.x
  region: us-east-1
  stage: ${opt:stage, 'dev'}
  environment:
    FOOTBALL_API_KEY: ${env:FOOTBALL_API_KEY, ssm:/tgw/football-api-key}
    NEWS_API_KEY: ${env:NEWS_API_KEY, ssm:/tgw/news-api-key}
    ALLOWED_ORIGINS: ${self:custom.allowedOrigins.${self:provider.stage}}
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - bedrock:InvokeModel
          Resource:
            - "arn:aws:bedrock:us-east-1::foundation-model/amazon.nova-micro-v1:0"
        - Effect: Allow
          Action:
            - bedrock:InvokeAgent
          Resource:
            - "arn:aws:bedrock:us-east-1:*:agent/*"
            - "arn:aws:bedrock:us-east-1:*:agent-alias/*"
  apiGateway:
    apiKeys:
      - tgw-frontend-${self:provider.stage}
      - footbball-app-${self:provider.stage}
    usagePlan:
      quota:
        limit: 1000
        period: DAY
      throttle:
        burstLimit: 15
        rateLimit: 10

custom:
  allowedOrigins:
    dev: "https://the-gooners-world.web.app,https://the-footbball-app.web.app"
    prod: "https://the-gooners-world.web.app,https://the-footbball-app.web.app"

functions:
  footballProxy:
    handler: functions/proxy/footballProxy.handler
    events:
      - http:
          path: proxy/football
          method: get
          cors: true
          private: true

  newsProxy:
    handler: functions/proxy/newsProxy.handler
    events:
      - http:
          path: proxy/news
          method: get
          cors: true
          private: true

  aiProxy:
    handler: functions/proxy/aiProxy.handler
    timeout: 15
    events:
      - http:
          path: proxy/ai
          method: get
          cors: true
          private: true

  # Bedrock Agent Core — action group handler
  agentHandler:
    handler: functions/agent/agentHandler.handler
    timeout: 30
    description: Bedrock Agent Core action group handler for Arsenal FC Assistant

  # Agent chat endpoint — invoked by frontend chat widget
  agentChat:
    handler: functions/agent/agentChat.handler
    timeout: 30
    environment:
      BEDROCK_AGENT_ID: ${env:BEDROCK_AGENT_ID, 'PLACEHOLDER'}
      BEDROCK_AGENT_ALIAS_ID: ${env:BEDROCK_AGENT_ALIAS_ID, 'PLACEHOLDER'}
    events:
      - http:
          path: agent/chat
          method: post
          cors: true
          private: true

plugins:
  - serverless-offline
